<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body background="red">
    <form method="get" action="aaa.php">
        <fieldset>
            <legend>基本資料介紹</legend>
            <p>姓名<sup>*</sup><input type="text" name="stdna" placeholder="請輸入中文姓名" size="50" maxlength="10" required></p>
            <p>密碼:<input type="password" name="stdpwd" placeholder="密碼8-16字"></p>
            <p>
                性別: <input type="radio" name="stdsex" value="M" checked>男
                性別: <input type="radio" name="stdsex" value="F">女
                性別: <input type="radio" name="stdsex" value="O">其他
            </p>
            <p>
                <input type="checkbox" name="int[]" value="game">手遊
                <input type="checkbox" name="int[]" value="sport">運動
                <input type="checkbox" name="int[]" value="music">音樂
            </p>
            <p>區域:<select name="stdArea" > <!--multiple-->
                <option value="A">基隆市</option>
                <option value="B" selected>台北市</option>
                <option value="C">新北市</option>
                <option value="D">桃園市</option>
            </select></p>
            <p>出生:<input type="date" name="stdBirth" value="2026-03-17"></p>
            <p>年齡:<input type="text" name="stdage" min="1" max="100" value="18"></p>
            <p>個性:內向<input type="range" name="stdper" min="1" max="10" step="0.1" value="1">外向</p>
            <p>說明 <textarea name="stdmit" cols="50" rows="5"></textarea></p>
            <input type="number" value="送出">&nbsp; <input type="reset" value="取消">
        </fieldset>

    </form>
</body>
</html>
